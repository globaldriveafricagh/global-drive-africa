<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Global drive Africa</title>
    <link rel="stylesheet" href="css/style.css">`n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: var(--bg-light);">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo"><img src="assets/images/logo.jpg" alt="Global Drive Africa"></a>
        </nav>
    </header>

    <main class="auth-container">
        <form class="auth-form" id="loginForm">
            <h2>Welcome Back</h2>
            <div id="alertBox" class="alert"></div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="example@gmail.com">
            </div>
            
            <div class="form-group" style="margin-bottom: 5px;">
                <label>Password</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="forgot-password.html" style="font-size: 0.85em; color: var(--text-light); text-decoration: none;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-main form-btn" id="loginBtn">Login</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9em;">
                Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register here</a>
            </p>
        </form>
    </main>

    <script type="module">
        import { AuthAPI } from './js/auth/auth.js';

        const form = document.getElementById('loginForm');
        const alertBox = document.getElementById('alertBox');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;

            try {
                const res = await AuthAPI.login(email, password);
                alertBox.textContent = 'Login successful! Redirecting...';
                alertBox.className = 'alert success';
                alertBox.style.display = 'block';
                
                setTimeout(() => {
                    if(res.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);
            } catch (err) {
                alertBox.textContent = err.message || 'Login failed';
                alertBox.className = 'alert error';
                alertBox.style.display = 'block';
                loginBtn.textContent = 'Login';
                loginBtn.disabled = false;
            }
        });
    </script>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/233244240166" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>

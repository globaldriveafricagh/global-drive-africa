<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - CarsMarketplace</title>
    <link rel="stylesheet" href="css/style.css">`n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo"><img src="assets/images/logo.jpg" alt="Global Drive Africa"></a>
            <ul class="nav-links"></ul> <!-- Injected by app.js -->
            <div class="auth-nav" id="authNav"></div>
        </nav>
    </header>

    <main class="container" style="margin-top: calc(var(--header-height) + 20px);">
        <section class="page-hero hero-cart">
            <h1>Your Interest Cart</h1>
            <p style="font-size: 1.2rem; margin-top: 15px;">Review the vehicles you are interested in.</p>
        </section>
        
        <div id="cartContainer" style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow);">
            <div style="overflow-x: auto;">
                <table style="width: 100%; text-align: left;">
                    <thead style="border-bottom: 2px solid var(--border);">
                        <tr>
                            <th style="padding: 10px;">Vehicle</th>
                            <th style="padding: 10px;">Brand/Model</th>
                            <th style="padding: 10px;">Price</th>
                            <th style="padding: 10px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="cartTableBody">
                    </tbody>
                </table>
            </div>
            
            <div style="margin-top: 30px; text-align: right;">
                <h3 style="font-size: 1.5rem;">Total: <span id="cartTotal" style="color: var(--primary-color);">GHS 0</span></h3>
                <button class="btn btn-main" style="margin-top: 15px; padding: 12px 30px; font-size: 1.1rem;" onclick="alert('Checkout feature coming soon! Ensure you login or request an installment on the car details page.')">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <script type="module" src="js/ui/app.js"></script>
    <script type="module">
        import { UI } from './js/ui/app.js';

        const renderCart = () => {
            const cartList = JSON.parse(localStorage.getItem('cars_cart') || '[]');
            const tbody = document.getElementById('cartTableBody');
            let total = 0;

            if (cartList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 20px;">Your cart is empty. <a href="inventory.html" style="color:var(--primary-color);">Browse Cars</a></td></tr>';
                document.getElementById('cartTotal').innerText = 'GHS 0';
                return;
            }

            tbody.innerHTML = cartList.map((car, idx) => {
                total += car.price;
                return `
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 15px;">
                        <img src="${encodeURI(car.image)}" style="width: 100px; height: 70px; object-fit: cover; border-radius: 4px; border: 1px solid #eee;" onerror="this.src='https://via.placeholder.com/100x70?text=Car'">
                    </td>
                    <td style="padding: 15px;">
                        <div style="font-weight: bold; font-size: 1.1rem; color: var(--secondary-color);">
                            ${UI.sanitize(String(car.year))} ${UI.sanitize(car.brand)} ${UI.sanitize(car.model)}
                        </div>
                        <div style="font-size: 0.9rem; color: var(--text-light); margin-top: 5px;">
                            Condition: ${UI.sanitize(car.condition)} | ${UI.sanitize(car.transmission)}
                        </div>
                    </td>
                    <td style="padding: 15px; font-weight: bold; color: var(--primary-color); font-size: 1.1rem;">
                        GHS ${car.price.toLocaleString()}
                    </td>
                    <td style="padding: 15px;">
                        <button onclick="window.removeFromCart(${idx})" class="btn" style="background: #fff; border: 1px solid var(--danger); color: var(--danger); padding: 5px 12px; font-size: 0.9rem; border-radius: 4px; transition: all 0.3s; cursor:pointer;" onmouseover="this.style.background='var(--danger)'; this.style.color='white'" onmouseout="this.style.background='white'; this.style.color='var(--danger)'">Remove</button>
                    </td>
                </tr>
                `;
            }).join('');

            document.getElementById('cartTotal').innerText = `GHS ${total.toLocaleString()}`;
        };

        window.removeFromCart = (index) => {
            const cart = JSON.parse(localStorage.getItem('cars_cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cars_cart', JSON.stringify(cart));
            renderCart();
            UI.updateCartCount();
        };

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/233244240166" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikes & Trice - Global drive Africa</title>
    <link rel="stylesheet" href="css/style.css">`n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo"><img src="assets/images/logo.jpg" alt="Global Drive Africa"></a>
            <ul class="nav-links">
                <li><a href="inventory.html">Inventory</a></li>
                <li><a href="toyota.html">Toyota</a></li>
                <li><a href="honda.html">Honda</a></li>
                <li><a href="hyundai.html">Hyundai</a></li>
                <li><a href="trice.html" class="active">Bikes & Trice</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-hero hero-trice">
            <h1>Bikes & Trice Inventory</h1>
            <p style="font-size: 1.2rem; margin-top: 15px;">Explore our collection of quality passenger and cargo tricycles and motorbikes.</p>
        </section>

        <section class="container">
            <div class="car-grid" id="brandGrid">
                <p>Loading Trice...</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/ui/app.js"></script>
    <script type="module">
        import { dbInstance } from './js/database/db.js';
        import { UI } from './js/ui/app.js';
        import { dbReady } from './js/database/dummy-data.js';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await dbReady;
                const allCars = await dbInstance.getByIndex('cars', 'brand', 'Trice');
                const available = allCars.filter(c => c.status === 'available');
                UI.renderCarCards(available, 'brandGrid');
            } catch (err) {
                document.getElementById('brandGrid').innerHTML = '<p>Error loading cars.</p>';
            }
        });
    </script>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/233244240166" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>

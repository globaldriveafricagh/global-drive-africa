<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Global drive Africa</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - var(--header-height));
            padding: 20px;
        }
    </style>
</head>
<body style="background: var(--bg-light);">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo"><img src="assets/images/logo.jpg" alt="Global Drive Africa"></a>
        </nav>
    </header>

    <main class="auth-container">
        <form class="auth-form" id="forgotForm">
            <h2 style="margin-bottom: 10px;">Reset Password</h2>
            <p style="color: var(--text-light); text-align: center; margin-bottom: 25px; font-size: 0.9em;">Enter your email address and we'll send you a link to reset your password.</p>
            
            <div id="alertBox" class="alert"></div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="example@gmail.com">
            </div>
            
            <button type="submit" class="btn btn-main form-btn" id="resetBtn">Send Reset Link</button>
            <p style="text-align: center; margin-top: 15px; font-size: 0.9em;">
                Remembered your password? <a href="login.html" style="color: var(--primary-color);">Return to Login</a>
            </p>
        </form>
    </main>

    <script type="module">
        const form = document.getElementById('forgotForm');
        const alertBox = document.getElementById('alertBox');
        const resetBtn = document.getElementById('resetBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            resetBtn.textContent = 'Sending...';
            resetBtn.disabled = true;

            // Simple dummy logic for demonstration
            setTimeout(() => {
                alertBox.textContent = `A reset link has been sent to ${email}. If it doesn't appear in your inbox, check your spam folder.`;
                alertBox.className = 'alert success';
                alertBox.style.display = 'block';
                resetBtn.textContent = 'Link Sent!';
            }, 1000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Tyre - CarsMarketplace</title>
    <link rel="stylesheet" href="css/style.css">`n    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo"><img src="assets/images/logo.jpg" alt="Global Drive Africa"></a>
            <ul class="nav-links">
                <li><a href="inventory.html">All Vehicles</a></li>
                <li><a href="trice-motor.html">Trice Motor</a></li>
                <li><a href="cart.html" id="cartNavCount">Cart (0)</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)); padding: 80px 20px; text-align: center; color: white; margin-top: var(--header-height);">
            <h1>Three Tyre Models</h1>
            <p style="font-size: 1.2rem; margin-top: 15px;">Reliable passenger and load tricycles.</p>
        </div>

        <section class="container">
            <h2 class="section-title">Three Tyre Inventory</h2>
            <div class="car-grid" id="brandGrid">
                <p>Loading Three Tyre...</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/ui/app.js"></script>
    <script type="module">
        import { dbInstance } from './js/database/db.js';
        import { UI } from './js/ui/app.js';
        import { dbReady } from './js/database/dummy-data.js';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await dbReady;
                const allCars = await dbInstance.getByIndex('cars', 'brand', 'Three Tyre');
                const available = allCars.filter(c => c.status === 'available');
                UI.renderCarCards(available, 'brandGrid');
            } catch (err) {
                document.getElementById('brandGrid').innerHTML = '<p>Error loading cars.</p>';
            }
        });
    </script>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/233244240166" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
